server:
  port: 8083                     # notification-service listens on port 8083

spring:
  application:
    name: notification-service

  # English default for messages when a request sends no Accept-Language header.
  web:
    locale: en

  # Flyway manages the schema only for the postgres profile (application-postgres.yml).
  flyway:
    enabled: false

  # --- Default/dev operation: H2 in-memory DB (no Docker needed) ---
  datasource:
    url: jdbc:h2:mem:notifications;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  # RabbitMQ connection (matches the docker-compose broker's custom user).
  rabbitmq:
    host: localhost
    port: 5672
    username: billing
    password: billing

# Messaging topology - the same names are used by the invoice-service publisher.
billing:
  messaging:
    exchange: billing.events
    invoice-issued-routing-key: invoice.issued
    invoice-notifications-queue: invoice-notifications

# Swagger UI (interactive API docs): http://localhost:8083/swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html
