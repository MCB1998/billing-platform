# Local development infrastructure for the billing platform.
# Database-per-service: each service gets its own PostgreSQL instance.
# The credentials here are for LOCAL DEV ONLY - in real environments they come
# from environment variables / a secrets manager (never committed).
services:
  customer-db:
    image: postgres:16-alpine
    container_name: billing-customer-db
    environment:
      POSTGRES_DB: customer
      POSTGRES_USER: customer
      POSTGRES_PASSWORD: customer
    ports:
      - "5432:5432"
    volumes:
      - customer-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customer -d customer"]
      interval: 5s
      timeout: 3s
      retries: 5

  invoice-db:
    image: postgres:16-alpine
    container_name: billing-invoice-db
    environment:
      POSTGRES_DB: invoice
      POSTGRES_USER: invoice
      POSTGRES_PASSWORD: invoice
    ports:
      - "5433:5432"
    volumes:
      - invoice-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice -d invoice"]
      interval: 5s
      timeout: 3s
      retries: 5

  notification-db:
    image: postgres:16-alpine
    container_name: billing-notification-db
    environment:
      POSTGRES_DB: notification
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification
    ports:
      - "5434:5432"
    volumes:
      - notification-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notification"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: billing-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: billing
      RABBITMQ_DEFAULT_PASS: billing
    ports:
      - "5672:5672"      # AMQP protocol
      - "15672:15672"    # management UI: http://localhost:15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Identity provider: issues the JWTs the api-gateway validates. Runs in dev mode
  # (in-memory database), so the realm is re-imported from realm-billing.json on every
  # start - that file is the single, reproducible source of realm/client/user setup.
  # Dev only: a real deployment uses a persistent database and never ships passwords.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: billing-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin      # admin console: http://localhost:8090
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8090:8080"    # 8080 inside the container; the api-gateway owns 8080 on the host
    volumes:
      - ./keycloak/realm-billing.json:/opt/keycloak/data/import/realm-billing.json:ro

volumes:
  customer-db-data:
  invoice-db-data:
  notification-db-data:
  rabbitmq-data:
