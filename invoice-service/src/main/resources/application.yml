server:
  port: 8082                     # invoice-service listens on port 8082 (customer-service uses 8081)

spring:
  application:
    name: invoice-service

  # Default locale for messages (e.g. validation) when a request sends no
  # Accept-Language header. Requests that do send one are still honored (i18n).
  web:
    locale: en

  # Flyway manages the schema only for the postgres profile (application-postgres.yml).
  # The default H2 dev/test setup builds the schema via Hibernate instead.
  flyway:
    enabled: false

  # --- Default/dev operation: H2 in-memory DB (no Docker needed) ---
  datasource:
    url: jdbc:h2:mem:invoices;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop      # generate schema from entities on startup (dev only!)
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

# Base URL of the customer-service, used by the Feign client.
customer-service:
  url: http://localhost:8081

springdoc:
  swagger-ui:
    path: /swagger-ui.html
