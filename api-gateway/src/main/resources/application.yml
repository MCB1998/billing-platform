server:
  port: 8080                     # the gateway is the single entry point on port 8080

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak's public keys. Deliberately jwk-set-uri (lazy: fetched on the first
          # token) rather than issuer-uri, which would do OIDC discovery at startup and
          # therefore refuse to start whenever Keycloak is down - including in tests/CI.
          # Trade-off: issuer-uri would also validate the "iss" claim for free.
          jwk-set-uri: ${keycloak.jwk-set-uri}
  cloud:
    gateway:
      routes:
        # Path stays identical whether a caller hits the service directly or via the
        # gateway (no prefix, no StripPrefix); the resource paths are already distinct.
        - id: customer-service
          uri: ${services.customer}
          predicates:
            - Path=/customers/**
        - id: invoice-service
          uri: ${services.invoice}
          predicates:
            - Path=/invoices/**
        - id: notification-service
          uri: ${services.notification}
          predicates:
            - Path=/notifications/**

# Downstream targets, externalized so they can be overridden per environment (e.g.
# service names instead of localhost when running under docker-compose).
services:
  customer: http://localhost:8081
  invoice: http://localhost:8082
  notification: http://localhost:8083

# Identity provider (docker-compose service "keycloak", host port 8090).
keycloak:
  jwk-set-uri: http://localhost:8090/realms/billing/protocol/openid-connect/certs

# Actuator: expose health and the gateway route table (read-only insight into routing).
# The 'gateway' endpoint is disabled by default, so enable it explicitly.
management:
  endpoint:
    gateway:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, info, gateway
