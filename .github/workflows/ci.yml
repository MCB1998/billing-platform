name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test customer-service
        working-directory: customer-service
        run: ./mvnw -B verify

      - name: Build and test invoice-service
        working-directory: invoice-service
        run: ./mvnw -B verify
