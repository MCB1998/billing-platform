# Applied when the 'postgres' profile is active (e.g. --spring.profiles.active=postgres).
# Overrides the default H2 setup to run against the PostgreSQL container (docker-compose).
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/customer   # host port from docker-compose
    driver-class-name: org.postgresql.Driver          # override the H2 driver from the base config
    username: customer
    password: customer                                # dev default; override via env in real envs

  jpa:
    hibernate:
      ddl-auto: validate    # schema is owned by Flyway; Hibernate only verifies it matches the entities
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Schema is managed by Flyway (src/main/resources/db/migration) for this profile.
  flyway:
    enabled: true

  # No H2 console when running on PostgreSQL.
  h2:
    console:
      enabled: false
