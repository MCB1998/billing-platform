server:
  port: 8081                     # customer-service listens on port 8081

spring:
  application:
    name: customer-service

  # Default locale for messages (e.g. validation) when a request sends no
  # Accept-Language header. Requests that do send one are still honored (i18n).
  web:
    locale: en

  # Flyway manages the schema only for the postgres profile (application-postgres.yml).
  # The default H2 dev/test setup builds the schema via Hibernate + schema.sql instead.
  flyway:
    enabled: false

  # --- Default/dev operation: H2 in-memory DB (no Docker needed) ---
  # MODE=PostgreSQL makes H2 behave as close to Postgres as possible,
  # so the difference to real operation stays small.
  datasource:
    url: jdbc:h2:mem:customers;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop      # generate schema from entities on startup (dev only!)
    show-sql: true               # show generated SQL in the log (good for learning)
    properties:
      hibernate:
        format_sql: true

  # H2 web console to inspect the DB: http://localhost:8081/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console

# Swagger UI (interactive API docs): http://localhost:8081/swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html
